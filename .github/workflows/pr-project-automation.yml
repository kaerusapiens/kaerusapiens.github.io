name: PR Project Automation

on:
  pull_request_target:
    types:
      - opened
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-pr-metadata:
    runs-on: ubuntu-latest

    env:
      PROJECT_OWNER: kaerusapiens
      PROJECT_NUMBER: 4
      PROJECT_DATE_FIELD_NAME: pr_opened_at
      PR_DEFAULT_ASSIGNEE: ${{ vars.PR_DEFAULT_ASSIGNEE }}

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PR_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.PR_AUTOMATION_APP_PRIVATE_KEY }}
          owner: ${{ env.PROJECT_OWNER }}

      - name: Assign PR author
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ASSIGNEE: ${{ vars.PR_DEFAULT_ASSIGNEE || github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            --method POST \
            "repos/$REPO/issues/$PR_NUMBER/assignees" \
            -f "assignees[]=$ASSIGNEE"

      - name: Add PR to project and update opened date
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
          OPENED_DATE: ${{ github.event.pull_request.created_at }}
        run: |
          OPENED_DATE="${OPENED_DATE%%T*}"

          project_json="$(gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              user(login: $owner) {
                projectV2(number: $number) {
                  id
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2FieldCommon {
                        id
                        name
                      }
                    }
                  }
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        __typename
                        ... on PullRequest {
                          id
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -F owner="$PROJECT_OWNER" -F number="$PROJECT_NUMBER")"

          project_id="$(jq -r '.data.user.projectV2.id' <<<"$project_json")"
          field_id="$(jq -r --arg name "$PROJECT_DATE_FIELD_NAME" '.data.user.projectV2.fields.nodes[] | select(.name == $name) | .id' <<<"$project_json")"
          item_id="$(jq -r --arg pr_id "$PR_NODE_ID" '.data.user.projectV2.items.nodes[] | select(.content.id == $pr_id) | .id' <<<"$project_json")"

          [ -n "$project_id" ] && [ "$project_id" != "null" ] || { echo "Project not found"; exit 1; }
          [ -n "$field_id" ] && [ "$field_id" != "null" ] || { echo "Field not found: $PROJECT_DATE_FIELD_NAME"; exit 1; }

          if [ -z "$item_id" ] || [ "$item_id" = "null" ]; then
            item_id="$(gh api graphql -f query='
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item {
                    id
                  }
                }
              }
            ' -F projectId="$project_id" -F contentId="$PR_NODE_ID" --jq '.data.addProjectV2ItemById.item.id')"
          fi

          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
              updateProjectV2ItemFieldValue(
                input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: {date: $date}
                }
              ) {
                projectV2Item {
                  id
                }
              }
            }
          ' -F projectId="$project_id" -F itemId="$item_id" -F fieldId="$field_id" -F date="$OPENED_DATE" >/dev/null
